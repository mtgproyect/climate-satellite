name: Actualizar satélite SMN

run-name: Satélite SMN · disparo externo

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: climate-satellite
  cancel-in-progress: true

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Actualizar catálogo satelital
        run: python scripts/actualizar_satelite_smn.py

      - name: Validar contrato
        run: |
          python -m json.tool docs/manifiesto.json > /dev/null
          python -m unittest discover -s tests -v

      - name: Guardar manifiesto en GitHub
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/manifiesto.json

          if git diff --cached --quiet; then
            echo "No hay un cuadro nuevo para guardar en GitHub."
            exit 0
          fi

          git commit -m "Actualizar catálogo satelital SMN"

          for intento in 1 2 3; do
            echo "Intento de publicación ${intento}/3"

            git fetch origin main

            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Conflicto al integrar cambios remotos."
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "Catálogo satelital actualizado en GitHub."
              exit 0
            fi

            sleep 5
          done

          echo "No fue posible publicar después de 3 intentos."
          exit 1

      - name: Preparar imágenes satelitales para R2
        run: python scripts/preparar_satelite_r2.py

      - name: Instalar AWS CLI para R2
        run: |
          python -m pip install --upgrade pip
          pip install awscli

      - name: Subir imágenes satelitales a Cloudflare R2 Media
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 sync .r2/satellite/TOP_C13_ARG_ALTA/ s3://weathervar-media/satellite/TOP_C13_ARG_ALTA/ \
            --endpoint-url "$R2_ENDPOINT" \
            --delete \
            --content-type "image/jpeg" \
            --cache-control "public, max-age=86400, immutable"

      - name: Subir manifiesto satelital final a Cloudflare R2 Data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp .r2/satellite-manifiesto.json s3://weathervar-data/satellite/manifiesto.json \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "public, max-age=300"

          echo "Satélite publicado correctamente en Cloudflare R2 con imágenes propias."
