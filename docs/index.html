<!doctype html>
<html lang="es-AR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#071a33">
  <title>Satélite SMN · ClimateProyectar</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: #071a33;
      color: #eef6ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(180deg,#071a33,#0c2a4d); }
    main { width: min(100% - 28px, 980px); margin: 0 auto; padding: 32px 0 48px; }
    h1 { margin: 0 0 8px; }
    .muted { color: #a9bdd4; }
    .card {
      margin-top: 22px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 20px;
      background: rgba(255,255,255,.06);
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
    }
    img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: contain;
      border-radius: 14px;
      background: #020810;
    }
    .row { display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .status { font-weight: 800; }
    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 12px;
      color: #071a33;
      background: #d9efff;
      font-weight: 800;
      cursor: pointer;
    }
    a { color: #9fd5ff; }
  </style>
</head>
<body>
  <main>
    <p class="muted">ClimateProyectar · módulo independiente</p>
    <h1>Imágenes satelitales del SMN</h1>
    <p class="muted">Las imágenes se cargan desde el servidor oficial del SMN. Este repositorio solo publica sus URLs.</p>

    <section class="card">
      <img id="satellite-image" alt="Imagen satelital de topes nubosos sobre Argentina">
      <div class="row">
        <div>
          <div id="status" class="status">Cargando…</div>
          <div id="timestamp" class="muted"></div>
        </div>
        <button id="toggle" type="button">Pausar animación</button>
      </div>
    </section>

    <p class="muted">Fuente: <a href="https://www.smn.gob.ar/satelite" rel="noopener noreferrer">Servicio Meteorológico Nacional</a>.</p>
  </main>

  <script>
    (() => {
      "use strict";

      const image = document.getElementById("satellite-image");
      const status = document.getElementById("status");
      const timestamp = document.getElementById("timestamp");
      const toggle = document.getElementById("toggle");

      let frames = [];
      let position = 0;
      let timer = null;

      function renderFrame() {
        if (!frames.length) return;
        const frame = frames[position % frames.length];
        image.src = frame.url;
        timestamp.textContent = `Cuadro: ${new Intl.DateTimeFormat("es-AR", {
          dateStyle: "medium",
          timeStyle: "medium",
        }).format(new Date(frame.timestamp_argentina))}`;
        position = (position + 1) % frames.length;
      }

      function start() {
        if (timer || frames.length < 2) return;
        timer = window.setInterval(renderFrame, 700);
        toggle.textContent = "Pausar animación";
      }

      function stop() {
        window.clearInterval(timer);
        timer = null;
        toggle.textContent = "Reanudar animación";
      }

      toggle.addEventListener("click", () => {
        if (timer) stop();
        else start();
      });

      fetch(`./manifiesto.json?t=${Date.now()}`, { cache: "no-store" })
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then((manifest) => {
          frames = Array.isArray(manifest.animation_frames)
            ? manifest.animation_frames
            : [];
          status.textContent = manifest.status === "ok"
            ? `${frames.length} cuadros en animación`
            : "Se muestra el último catálogo disponible";
          if (!frames.length && manifest.latest) frames = [manifest.latest];
          if (!frames.length) throw new Error("Todavía no hay imágenes disponibles.");
          position = Math.max(0, frames.length - 1);
          renderFrame();
          start();
        })
        .catch((error) => {
          console.error(error);
          status.textContent = "No se pudo cargar el catálogo satelital.";
          timestamp.textContent = error.message;
          toggle.hidden = true;
        });
    })();
  </script>
</body>
</html>
